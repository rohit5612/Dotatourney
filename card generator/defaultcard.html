<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BPCL Luxury Font Player Card Engine</title>

  <style>
    :root {
      --page-bg: #1f1f1f;

      --card-width: 340px;
      --card-height: 520px;

      --white-1: #ecebe8;
      --white-2: #e4e3e0;
      --white-3: #dbd9d5;

      --edge-1: #c8c8c8;
      --edge-2: #d6d6d6;
      --edge-3: #b5b5b5;

      --text-dark: #252525;
      --text-mid: #6f6f6f;

      --avatar-bg: #dddcd8;
      --avatar-border: #d1d1d1;

      --engrave-dark: #232323;
      --engrave-sub: #4a4a4a;
      --engrave-highlight: rgba(255,255,255,0.96);
      --engrave-shadow: rgba(0,0,0,0.16);

      --panel-bg: #1f1f1f;
      --panel-border: #383838;
      --input-bg: #2b2b2b;
      --input-border: #555555;
      --input-text: #f2f2f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #2b2b2b 0%, var(--page-bg) 58%);
      font-family: Arial, Helvetica, sans-serif;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .app {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    #card-output {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player-card {
      position: relative;
      width: var(--card-width);
      height: var(--card-height);
      border-radius: 26px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.42) 0%, rgba(255,255,255,0.12) 14%, rgba(255,255,255,0) 28%),
        linear-gradient(180deg, var(--white-1) 0%, var(--white-2) 42%, var(--white-3) 100%);
      border: 1px solid var(--edge-1);
      box-shadow:
        0 18px 40px rgba(0,0,0,0.24),
        inset 0 1px 0 rgba(255,255,255,0.98),
        inset 0 -1px 0 rgba(0,0,0,0.02);
      padding: 18px;
      isolation: isolate;
    }

    .player-card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 20px;
      border: 1px solid var(--edge-2);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.78),
        inset 0 0 18px rgba(255,255,255,0.36);
      pointer-events: none;
      z-index: 0;
    }

    .player-card::after {
      content: "";
      position: absolute;
      inset: 20px;
      border-radius: 16px;
      border: 1px solid rgba(208,208,208,0.96);
      clip-path: polygon(0 12px, 12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px));
      pointer-events: none;
      z-index: 0;
    }

    .corner-accent {
      position: absolute;
      width: 32px;
      height: 32px;
      z-index: 1;
      opacity: 0.88;
    }

    .corner-accent--tl {
      top: 18px;
      left: 18px;
      border-top: 1px solid var(--edge-3);
      border-left: 1px solid var(--edge-3);
      border-top-left-radius: 9px;
    }

    .corner-accent--tr {
      top: 18px;
      right: 18px;
      border-top: 1px solid var(--edge-3);
      border-right: 1px solid var(--edge-3);
      border-top-right-radius: 9px;
    }

    .corner-accent--bl {
      bottom: 18px;
      left: 18px;
      border-bottom: 1px solid var(--edge-3);
      border-left: 1px solid var(--edge-3);
      border-bottom-left-radius: 9px;
    }

    .corner-accent--br {
      bottom: 18px;
      right: 18px;
      border-bottom: 1px solid var(--edge-3);
      border-right: 1px solid var(--edge-3);
      border-bottom-right-radius: 9px;
    }

    .player-card__content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 26px;
      padding-bottom: 16px;
    }

    .player-card__avatar-shell {
      width: 206px;
      height: 206px;
      padding: 10px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.45) 20%, rgba(255,255,255,0) 36%),
        linear-gradient(180deg, #fcfcfc, #ededed);
      border: 1px solid #d3d3d3;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.98),
        0 8px 18px rgba(0,0,0,0.06);
      position: relative;
    }

    .player-card__avatar-shell::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 16px;
      border: 1px solid #dfdfdf;
      pointer-events: none;
    }

    .player-card__avatar {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.65), rgba(255,255,255,0) 55%),
        linear-gradient(180deg, #f7f7f7, var(--avatar-bg));
      border: 1px solid var(--avatar-border);
      position: relative;
    }

    .player-card__avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .player-card__avatar-placeholder {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 4px solid #c3c3c3;
      position: relative;
      opacity: 0.66;
    }

    .player-card__avatar-placeholder::after {
      content: "";
      position: absolute;
      width: 128px;
      height: 66px;
      left: 50%;
      top: 78px;
      transform: translateX(-50%);
      border: 4px solid #c3c3c3;
      border-bottom: 0;
      border-radius: 66px 66px 0 0;
    }

    .player-card__bpcl-zone {
      width: 100%;
      display: flex;
      justify-content: center;
      text-align: center;
    }

    .player-card__bpcl-block {
      width: 100%;
      padding: 4px 12px 0;
    }

    .engraved {
      text-shadow:
        0 1px 0 var(--engrave-highlight),
        0 -1px 0 var(--engrave-shadow);
      user-select: none;
    }

    .player-card__bpcl-text {
      font-size: 49.6px;
      line-height: 0.92;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--engrave-dark);
      margin: 0;
      font-family: "Bodoni MT", "Didot", "Times New Roman", Georgia, serif;
      font-variant: small-caps;
    }

    .player-card__bpcl-sub-wrap {
      width: 100%;
      margin-top: 8px;
      padding: 0 4px;
      box-sizing: border-box;
    }

    .player-card__bpcl-sub {
      margin: 0;
      font-size: 10px;
      line-height: 1.15;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--engrave-sub);
      font-weight: 700;
      font-family: "Times New Roman", Georgia, serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-card__name-primary {
      width: 100%;
      margin-top: 20px;
      padding: 0 20px;
      text-align: center;
    }

    .player-card__footer {
      width: 100%;
      margin-top: auto;
      padding: 0 20px 0;
      text-align: center;
    }

    .player-card__divider-line,
    .player-card__name-line {
      width: 72%;
      height: 1px;
      margin: 0 auto 16px;
      background: #d9d9d9;
      position: relative;
    }

    .player-card__name-line::before,
    .player-card__name-line::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 20px;
      height: 1px;
      background: #cecece;
      transform: translateY(-50%);
    }

    .player-card__name-line::before {
      left: -30px;
    }

    .player-card__name-line::after {
      right: -30px;
    }

    .player-card__name {
      font-size: 33px;
      line-height: 1.1;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 20px;
      font-family: Georgia, "Times New Roman", serif;
      text-transform: lowercase;
    }

    .player-card__sub {
      margin-top: 10px;
      font-size: 11px;
      line-height: 1;
      color: var(--text-mid);
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .controls {
      width: 310px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 18px;
      color: #f0f0f0;
      box-shadow: 0 12px 28px rgba(0,0,0,0.24);
    }

    .controls__title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field label {
      font-size: 12px;
      color: #cccccc;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field input[type="text"],
    .field input[type="file"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 9px;
      color: var(--input-text);
      padding: 10px;
      font-size: 14px;
      outline: none;
    }

    .field input[type="text"]:focus {
      border-color: #8e8e8e;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 9px;
      padding: 10px 12px;
      background: #dddddd;
      color: #222222;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="card-output" aria-label="Generated player card"></section>

    <aside class="controls" aria-label="Player card controls">
      <div class="controls__title">Card Editor</div>

      <div class="field">
        <label for="player-name-input">Player Name</label>
        <input id="player-name-input" type="text" value="flabber" maxlength="24" />
      </div>

      <div class="field">
        <label for="avatar-input">Upload Avatar</label>
        <input id="avatar-input" type="file" accept="image/*" />
      </div>

      <div class="button-row">
        <button id="reset-avatar-button" type="button">Reset Avatar</button>
      </div>
    </aside>
  </main>

  <script>
    class PlayerCardEngine {
      constructor(options = {}) {
        this.mount = typeof options.mount === "string"
          ? document.querySelector(options.mount)
          : options.mount;

        if (!this.mount) {
          throw new Error("PlayerCardEngine: mount element not found.");
        }

        this.state = {
          playerName: "flabber",
          logoText: "BPCL",
          logoSub: "Bharat Pro Circuit League",
          subtitleText: "Default Player Card",
          avatarUrl: ""
        };
      }

      createCard(config = {}) {
        const data = { ...this.state, ...config };

        const card = document.createElement("article");
        card.className = "player-card";

        ["tl", "tr", "bl", "br"].forEach(pos => {
          const accent = document.createElement("div");
          accent.className = `corner-accent corner-accent--${pos}`;
          card.appendChild(accent);
        });

        const content = document.createElement("div");
        content.className = "player-card__content";

        const avatarShell = document.createElement("div");
        avatarShell.className = "player-card__avatar-shell";

        const avatar = document.createElement("div");
        avatar.className = "player-card__avatar";

        if (data.avatarUrl) {
          const img = document.createElement("img");
          img.src = data.avatarUrl;
          img.alt = `${data.playerName} avatar`;
          avatar.appendChild(img);
        } else {
          const placeholder = document.createElement("div");
          placeholder.className = "player-card__avatar-placeholder";
          avatar.appendChild(placeholder);
        }

        avatarShell.appendChild(avatar);

        const namePrimary = document.createElement("div");
        namePrimary.className = "player-card__name-primary";

        const nameLine = document.createElement("div");
        nameLine.className = "player-card__name-line player-card__divider-line";

        const name = document.createElement("div");
        name.className = "player-card__name";
        name.textContent = data.playerName || "flabber";

        namePrimary.appendChild(nameLine);
        namePrimary.appendChild(name);

        const footer = document.createElement("div");
        footer.className = "player-card__footer";

        const bpclZone = document.createElement("div");
        bpclZone.className = "player-card__bpcl-zone";

        const bpclBlock = document.createElement("div");
        bpclBlock.className = "player-card__bpcl-block";

        const bpclText = document.createElement("div");
        bpclText.className = "player-card__bpcl-text engraved";
        bpclText.textContent = data.logoText || "BPCL";

        bpclBlock.appendChild(bpclText);

        const bpclSubWrap = document.createElement("div");
        bpclSubWrap.className = "player-card__bpcl-sub-wrap";

        const bpclSubLine = document.createElement("div");
        bpclSubLine.className = "player-card__divider-line";

        const bpclSub = document.createElement("div");
        bpclSub.className = "player-card__bpcl-sub engraved";
        bpclSub.textContent = data.logoSub || "Bharat Pro Circuit League";

        bpclSubWrap.appendChild(bpclSubLine);
        bpclSubWrap.appendChild(bpclSub);
        bpclBlock.appendChild(bpclSubWrap);
        bpclZone.appendChild(bpclBlock);

        const sub = document.createElement("div");
        sub.className = "player-card__sub";
        sub.textContent = data.subtitleText || "Default Player Card";

        footer.appendChild(bpclZone);
        footer.appendChild(sub);

        content.appendChild(avatarShell);
        content.appendChild(namePrimary);
        content.appendChild(footer);

        card.appendChild(content);

        return card;
      }

      render(config = {}) {
        this.state = { ...this.state, ...config };
        this.mount.innerHTML = "";
        this.mount.appendChild(this.createCard(this.state));
      }

      setPlayerName(value) {
        this.render({
          playerName: value.trim() || "flabber"
        });
      }

      setAvatarFromFile(file) {
        if (!file || !file.type.startsWith("image/")) return;

        const reader = new FileReader();
        reader.onload = () => {
          this.render({ avatarUrl: reader.result });
        };
        reader.readAsDataURL(file);
      }

      resetAvatar() {
        this.render({ avatarUrl: "" });
      }
    }

    const engine = new PlayerCardEngine({ mount: "#card-output" });
    engine.render();

    const playerNameInput = document.querySelector("#player-name-input");
    const avatarInput = document.querySelector("#avatar-input");
    const resetAvatarButton = document.querySelector("#reset-avatar-button");

    playerNameInput.addEventListener("input", (event) => {
      engine.setPlayerName(event.target.value);
    });

    avatarInput.addEventListener("change", (event) => {
      const file = event.target.files && event.target.files[0];
      engine.setAvatarFromFile(file);
    });

    resetAvatarButton.addEventListener("click", () => {
      avatarInput.value = "";
      engine.resetAvatar();
    });
  </script>
</body>
</html>
