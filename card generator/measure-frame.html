<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Measure frame</title></head>
<body>
<pre id="out">loading…</pre>
<script>
(async () => {
  const img = new Image();
  img.src = "../dota/public/cards/player/frame-base.png";
  await img.decode();
  const w = img.naturalWidth;
  const h = img.naturalHeight;
  const sx = 400 / w;
  const sy = 600 / h;
  const c = document.createElement("canvas");
  c.width = w;
  c.height = h;
  const ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0);
  const d = ctx.getImageData(0, 0, w, h).data;
  const lum = (x, y) => {
    const i = (y * w + x) * 4;
    return (d[i] + d[i + 1] + d[i + 2]) / 3;
  };

  function bbox(threshold, y0, y1, x0, x1) {
    let minX = w, minY = h, maxX = 0, maxY = 0, n = 0;
    for (let y = y0; y < y1; y++) {
      for (let x = x0; x < x1; x++) {
        if (lum(x, y) < threshold) {
          n++;
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }
    if (!n) return null;
    return { minX, maxX, minY, maxY, cx: (minX + maxX) / 2, cy: (minY + maxY) / 2 };
  }

  function toDisplay(box) {
    return {
      cx: +(box.cx * sx).toFixed(1),
      cy: +(box.cy * sy).toFixed(1),
      w: +((box.maxX - box.minX) * sx).toFixed(1),
      h: +((box.maxY - box.minY) * sy).toFixed(1),
    };
  }

  // Find dark rows for tag slots
  const rowHits = [];
  for (let ny = 40; ny < 500; ny += 5) {
    let min = -1, max = -1;
    for (let x = 0; x < w; x++) {
      if (lum(x, ny) < 28) { if (min < 0) min = x; max = x; }
    }
    if (min >= 0 && max - min > w * 0.15) {
      rowHits.push({ ny, dy: ny * sy, span: (max - min) * sx });
    }
  }

  const topPlaque = toDisplay(bbox(28, 60, 280, 0, w));
  const basicBadge = toDisplay(bbox(28, 240, 420, 300, 900));
  const circle = toDisplay(bbox(10, 320, 980, 200, 1000));
  const stats = toDisplay(bbox(22, 1240, 1720, 60, 1140));

  const result = {
    native: [w, h],
    display: [400, 600],
    scale: sx,
    topPlaque,
    basicBadge,
    circle,
    stats,
    nameCy: +(((circle.cy * sy) + (stats.cy * sy)) / 2 * 0.55 + (circle.cy * sy) * 0.45).toFixed(1),
  };

  // Name sits between circle bottom and stats — estimate from frame lines ~62% height
  result.name = { cx: 200, cy: 372, w: 300, h: 44 };

  document.getElementById("out").textContent = JSON.stringify(result, null, 2);
})();
</script>
</body>
</html>
