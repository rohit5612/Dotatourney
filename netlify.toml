# Production frontend for bpcleague.in — see docs/deploy-bpcleague.md

[build]
  base = "dota"
  command = "npm ci && npm run build"
  publish = "dist"

# SPA fallback for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Canonical apex domain
[[redirects]]
  from = "https://www.bpcleague.in/*"
  to = "https://bpcleague.in/:splat"
  status = 301
  force = true
