# Static sunset page for bpcleague.in (legacy domain).
# Full React app builds on Hostinger VPS for bpcleague.com — see docs/deploy-bpcleague.md.

[build]
  base = "dota"
  command = "cp public/bpcl.png sunset/"
  publish = "sunset"

# All paths serve the single sunset page
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Canonical apex domain
[[redirects]]
  from = "https://www.bpcleague.in/*"
  to = "https://bpcleague.in/:splat"
  status = 301
  force = true
