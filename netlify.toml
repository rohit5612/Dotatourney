# Production frontend for bpcleague.in — see docs/deploy-bpcleague.md

[build]
  base = "dota"
  command = "npm ci && npm run build"
  publish = "dist"

# API proxy — same-origin /api/* → Hostinger VPS (must be before SPA catch-all)
[[redirects]]
  from = "/api/*"
  to = "https://api.bpcleague.in/api/:splat"
  status = 200
  force = true

# Canonical apex domain
[[redirects]]
  from = "https://www.bpcleague.in/*"
  to = "https://bpcleague.in/:splat"
  status = 301
  force = true

# SPA fallback for React Router — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
